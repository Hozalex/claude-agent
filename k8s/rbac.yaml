---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-bot
  namespace: default

---
# Long-lived token for the ServiceAccount (used for local/external access)
apiVersion: v1
kind: Secret
metadata:
  name: sre-bot-token
  namespace: default
  annotations:
    kubernetes.io/service-account.name: sre-bot
type: kubernetes.io/service-account-token

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-bot-readonly
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - pods/log
      - namespaces
      - events
      - services
      - endpoints
      - replicationcontrollers
      - persistentvolumes
      - persistentvolumeclaims
      - configmaps
      - resourcequotas
      - limitranges
    verbs: ["get", "list", "watch"]

  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - daemonsets
      - statefulsets
    verbs: ["get", "list", "watch"]

  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]

  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]

  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]

  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: ["get", "list"]

  # No secrets, no roles/bindings, no write verbs

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sre-bot-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sre-bot-readonly
subjects:
  - kind: ServiceAccount
    name: sre-bot
    namespace: default
